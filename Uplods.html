<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Upload Mod Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:18px;
  margin-bottom:15px;
  color:#00c853;
}

.card{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input, textarea, select{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#2a2a2a;
  color:white;
  outline:none;
  box-sizing:border-box;
}

textarea{
  height:80px;
  resize:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-main{
  background:#00c853;
}

.btn-sec{
  background:#2196f3;
}

.list{
  margin-top:10px;
}

.item{
  background:#2a2a2a;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.del-btn{
  background:#ff3b3b;
  border:none;
  color:white;
  width:34px;
  height:34px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.del-btn:hover{
  background:#ff1f1f;
}

.user-box{
  background:#151515;
  border:1px solid #2a2a2a;
  padding:12px;
  border-radius:12px;
  margin-bottom:15px;
}

.user-box span{
  color:#00c853;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>📦 Upload de Mods Pro</h1>

<div class="user-box">
  Logado como:
  <span id="nickLogado">Carregando...</span>
</div>

<!-- INFO -->
<div class="card">

  <h3>Informações</h3>

  <input id="nome" placeholder="Nome do Mod">

  <textarea id="descricao" placeholder="Descrição"></textarea>

  <input id="versao" placeholder="Versão">

  <select id="categoria">

    <option value="">Categoria</option>

    <option>Roupas</option>

    <option>Armas</option>

    <option>Veiculos</option>

    <option>Construções</option>

    <option>Variados</option>

  </select>

</div>

<!-- ARQUIVOS -->
<div class="card">

  <h3>Arquivos</h3>

  <input type="file" id="zip" accept=".zip">

  <input type="file" id="icone" accept="image/*">

  <input type="file" id="imagens" multiple accept="image/*">

</div>

<!-- DEPENDÊNCIAS -->
<div class="card">

  <h3>🔗 Dependências</h3>

  <input id="depNome" placeholder="Nome dependência">

  <input id="depLink" placeholder="Link">

  <button class="btn-sec" onclick="addDep()">
    Adicionar dependência
  </button>

  <div class="list" id="deps"></div>

</div>

<!-- VIDEOS -->
<div class="card">

  <h3>🎥 Vídeos YouTube</h3>

  <input id="videoLink" placeholder="Link do vídeo">

  <button class="btn-sec" onclick="addVideo()">
    Adicionar vídeo
  </button>

  <div class="list" id="videos"></div>

</div>

<!-- ENVIAR -->
<div class="card">

  <button class="btn-main" id="uploadBtn">
    🚀 Enviar Mod
  </button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getStorage,
  ref,
  uploadBytesResumable,
  getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

import {
  getDatabase,
  ref as dbRef,
  push
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyB5A-ySceXCFRQ7iSCnOA68nRJqYpK6DQc",

  databaseURL:
  "https://dayzozmbi-server-default-rtdb.firebaseio.com",

  projectId: "dayzozmbi-server",

  storageBucket:
  "dayzozmbi-server.firebasestorage.app",

  messagingSenderId: "221905253103",

  appId:
  "1:221905253103:android:fc1bc06782cf5735c4611a"

};

const app = initializeApp(firebaseConfig);

const storage = getStorage(app);

const db = getDatabase(app);

let dependencias = [];

let videos = [];

/* =========================
   USUÁRIO
========================= */

const usuario =
JSON.parse(localStorage.getItem("usuarioModSteam"));

if(!usuario || !usuario.nick){

  alert("Faça login primeiro!");

  window.location.href = "Login.html";

}

document.getElementById("nickLogado")
.innerText = usuario.nick;

/* =========================
   DEPENDÊNCIAS
========================= */

window.addDep = ()=>{

  const nome =
  document.getElementById("depNome").value;

  const link =
  document.getElementById("depLink").value;

  if(!nome || !link){

    return alert("Preencha tudo!");

  }

  dependencias.push({
    nome,
    link
  });

  renderDeps();

  document.getElementById("depNome").value = "";
  document.getElementById("depLink").value = "";

};

function renderDeps(){

  const el =
  document.getElementById("deps");

  el.innerHTML = "";

  dependencias.forEach((d,i)=>{

    const div =
    document.createElement("div");

    div.className = "item";

    div.innerHTML = `
      <span>🔗 ${d.nome}</span>

      <button class="del-btn">
        🗑️
      </button>
    `;

    div.querySelector(".del-btn")
    .onclick = ()=>{

      dependencias.splice(i,1);

      renderDeps();

    };

    el.appendChild(div);

  });

}

/* =========================
   VIDEOS
========================= */

window.addVideo = ()=>{

  const link =
  document.getElementById("videoLink").value;

  if(!link){

    return alert("Link inválido!");

  }

  videos.push(link);

  renderVideos();

  document.getElementById("videoLink").value = "";

};

function renderVideos(){

  const el =
  document.getElementById("videos");

  el.innerHTML = "";

  videos.forEach((v,i)=>{

    const div =
    document.createElement("div");

    div.className = "item";

    div.innerHTML = `
      <span>🎥 ${v}</span>

      <button class="del-btn">
        🗑️
      </button>
    `;

    div.querySelector(".del-btn")
    .onclick = ()=>{

      videos.splice(i,1);

      renderVideos();

    };

    el.appendChild(div);

  });

}

/* =========================
   UPLOAD
========================= */

document.getElementById("uploadBtn")
.addEventListener("click", async ()=>{

  const nome =
  document.getElementById("nome").value;

  const descricao =
  document.getElementById("descricao").value;

  const versao =
  document.getElementById("versao").value;

  const categoria =
  document.getElementById("categoria").value;

  const zip =
  document.getElementById("zip").files[0];

  const icone =
  document.getElementById("icone").files[0];

  const imagens =
  document.getElementById("imagens").files;

  if(
    !nome ||
    !descricao ||
    !zip ||
    !icone ||
    !categoria ||
    !versao
  ){

    return alert("Preencha tudo!");

  }

  if(imagens.length < 1 || imagens.length > 5){

    return alert("Envie de 1 a 5 imagens!");

  }

  try{

    const base =
    "mods/" + Date.now();

    const nomeSeguro = nome

      .normalize("NFD")

      .replace(/[\u0300-\u036f]/g,"")

      .replace(/[^a-zA-Z0-9 ]/g,"")

      .trim()

      .replace(/\s+/g,"_");

    /* TAMANHO DO MOD */
    const tamanhoMB =
    (zip.size / 1024 / 1024).toFixed(1);

    /* ZIP */
    const zipRef =
    ref(storage,
    `${base}/${nomeSeguro}.zip`);

    await uploadBytesResumable(
      zipRef,
      zip
    );

    const zipURL =
    await getDownloadURL(zipRef);

    /* ÍCONE */
    const iconRef =
    ref(storage,
    base+"/icon.png");

    await uploadBytesResumable(
      iconRef,
      icone
    );

    const iconURL =
    await getDownloadURL(iconRef);

    /* IMAGENS */
    let imgs = [];

    for(let i=0;i<imagens.length;i++){

      const imgRef =
      ref(storage,
      `${base}/img_${i}`);

      await uploadBytesResumable(
        imgRef,
        imagens[i]
      );

      const url =
      await getDownloadURL(imgRef);

      imgs.push(url);

    }

    /* SALVAR FIREBASE */
    await push(dbRef(db,"mods"),{

      nome,
      descricao,
      versao,
      categoria,

      zipURL,
      iconURL,

      imagens: imgs,

      dependencias,
      videos,

      data: Date.now(),

      downloads: 0,

      tamanhoMB,

      autorNick: usuario.nick

    });

    alert("Upload concluído!");

    window.location.href =
    "MinhasPublicacoes.html";

  }catch(e){

    alert(e.message);

  }

});

</script>

</body>
</html>
