<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModSteam</title>

<style>
body {
  margin: 0;
  background: #121212;
  color: white;
  font-family: Arial;
}

.header {
  padding: 10px 15px;
  font-size: 18px;
}

.categorias {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.cat-btn {
  padding: 8px 14px;
  background: #1f1f1f;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}

.cat-btn.active {
  background: #00c853;
  color: black;
}

.search {
  padding: 10px;
}
.search input {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #1f1f1f;
  color: white;
}

.row {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 10px;
}

.titulo {
  padding: 0 10px;
  font-size: 13px;
  color: #aaa;
}

.card {
  min-width: 140px;
  background: #1f1f1f;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card .info {
  padding: 8px;
}

.card .title {
  font-size: 13px;
}

.card .meta {
  font-size: 11px;
  color: #aaa;
}

/* 🔥 LOADER */
.loader {
  border: 3px solid #333;
  border-top: 3px solid #00c853;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  position: absolute;
  top: 45%;
  left: 45%;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

#modal {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: #121212;
  top: 0;
  left: 0;
  overflow-y: auto;
}

.close-btn {
  position: fixed;
  top: 10px;
  left: 10px;
  background: #1f1f1f;
  border-radius: 50%;
  width: 35px;
  height: 35px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
}

.modal-box {
  padding: 15px;
}

.modal-header {
  display: flex;
  gap: 12px;
  margin-top: 40px;
}

.modal-header img {
  width: 70px;
  height: 70px;
  border-radius: 15px;
}

.download-btn {
  background: #00c853;
  border: none;
  padding: 14px;
  width: 100%;
  border-radius: 25px;
  margin-top: 15px;
}

.gallery {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-top: 15px;
}

.gallery img {
  height: 140px;
  border-radius: 10px;
}
</style>
</head>
<body>

<div class="header">ModSteam</div>

<div class="categorias" id="categorias">
  <div class="cat-btn active" data-cat="Todos">Todos</div>
  <div class="cat-btn" data-cat="Roupas">Roupas</div>
  <div class="cat-btn" data-cat="Armas">Armas</div>
  <div class="cat-btn" data-cat="Veiculos">Veiculos</div>
  <div class="cat-btn" data-cat="Construções">Construções</div>
  <div class="cat-btn" data-cat="Variados">Variados</div>
</div>

<div class="search">
  <input type="text" id="busca" placeholder="Pesquisar mods...">
</div>

<div id="lista"></div>

<div id="modal">
  <div id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5A-ySceXCFRQ7iSCnOA68nRJqYpK6DQc",
  authDomain: "dayzozmbi-server.firebaseapp.com",
  databaseURL: "https://dayzozmbi-server-default-rtdb.firebaseio.com",
  projectId: "dayzozmbi-server",
  storageBucket: "dayzozmbi-server.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const lista = document.getElementById("lista");
const busca = document.getElementById("busca");
const categorias = document.querySelectorAll(".cat-btn");

let todosMods = [];
let categoriaAtual = "Todos";

function formatarData(t) {
  return t ? new Date(t).toLocaleDateString("pt-BR") : "Sem data";
}

function registrarDownload(index) {
  const mod = todosMods[index];
  const newCount = (mod.downloads || 0) + 1;

  update(ref(db, "mods/" + mod._key), {
    downloads: newCount
  });

  window.location.href = mod.zipURL;
}
window.registrarDownload = registrarDownload;

function render() {
  const termo = busca.value.toLowerCase();
  lista.innerHTML = "";

  const filtrados = todosMods.filter(m => {
    const matchNome = (m.nome || "").toLowerCase().includes(termo);
    const matchCat = categoriaAtual === "Todos" || m.categoria === categoriaAtual;
    return matchNome && matchCat;
  });

  const top = [...filtrados].sort((a,b)=>(b.downloads||0)-(a.downloads||0)).slice(0,5);
  const resto = filtrados.filter(m => !top.includes(m));

  if (top.length) {
    const titulo = document.createElement("div");
    titulo.className = "titulo";
    titulo.innerText = "🔥 Mais baixados";
    lista.appendChild(titulo);

    const rowTop = document.createElement("div");
    rowTop.className = "row";

    top.forEach(m => {
      const indexReal = todosMods.indexOf(m);
      rowTop.appendChild(criarCard(m, indexReal));
    });

    lista.appendChild(rowTop);
  }

  if (resto.length) {
    const titulo = document.createElement("div");
    titulo.className = "titulo";
    titulo.innerText = "📦 Todos";
    lista.appendChild(titulo);
  }

  for (let i = 0; i < resto.length; i += 4) {
    const row = document.createElement("div");
    row.className = "row";

    resto.slice(i, i + 4).forEach(m => {
      const indexReal = todosMods.indexOf(m);
      row.appendChild(criarCard(m, indexReal));
    });

    lista.appendChild(row);
  }
}

function criarCard(data, index) {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <div style="position:relative;">
      <div class="loader"></div>
      <img src="${data.iconURL}" onload="this.previousElementSibling.style.display='none'">
    </div>

    <div class="info">
      <div class="title">${data.nome}</div>
      <div class="meta">
        ${data.tamanho || "N/A"} • ${formatarData(data.data)} • ${data.downloads || 0} downloads
      </div>
      <div class="meta">
        ${data.versao || "Sem versão"} • ${data.categoria || "Sem categoria"}
      </div>
    </div>
  `;

  div.onclick = () => {
    document.getElementById("modal").style.display = "block";

    document.getElementById("modalContent").innerHTML = `
      <div class="close-btn" onclick="fechar()">✖</div>

      <div class="modal-box">
        <div class="modal-header">
          <img src="${data.iconURL}">
          <div>
            <div class="modal-title">${data.nome}</div>
            <div class="modal-meta">
              ${data.tamanho || "N/A"} • ${formatarData(data.data)} • ${data.downloads || 0} downloads
            </div>
          </div>
        </div>

        <button class="download-btn" onclick="registrarDownload(${index})">
          ⬇ Baixar
        </button>

        <p>${data.descricao}</p>

        <div class="gallery">
          ${(data.imagens || []).map(img => `
            <div style="position:relative;">
              <div class="loader"></div>
              <img src="${img}" onload="this.previousElementSibling.style.display='none'">
            </div>
          `).join("")}
        </div>
      </div>
    `;
  };

  return div;
}

function fechar() {
  document.getElementById("modal").style.display = "none";
}
window.fechar = fechar;

categorias.forEach(btn => {
  btn.onclick = () => {
    document.querySelector(".active").classList.remove("active");
    btn.classList.add("active");
    categoriaAtual = btn.dataset.cat;
    render();
  };
});

busca.addEventListener("input", render);

onValue(ref(db, "mods"), snap => {
  todosMods = [];

  snap.forEach(i => {
    const val = i.val();
    val._key = i.key;
    todosMods.push(val);
  });

  render();
});
</script>

</body>
</html>
