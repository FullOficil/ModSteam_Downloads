<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModSteam Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

.header {
  padding: 15px;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.menu-btn {
  font-size: 22px;
  cursor: pointer;
}

.header-right{
  display:flex;
  align-items:center;
  gap:10px;
}

/* NOTIFICAÇÃO */
.notify-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#1f1f1f;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-size:18px;
}

.notify-dot{
  position:absolute;
  top:7px;
  right:8px;
  width:8px;
  height:8px;
  background:#00c853;
  border-radius:50%;
}

.login-btn{
  background:#00c853;
  color:black;
  border:none;
  padding:10px 16px;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  max-width:140px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.sidebar {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: #111;
  transition: 0.3s;
  padding-top: 20px;
  z-index: 1000;
}

.sidebar a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid #222;
}

.sidebar a.active {
  background: #00c853;
  color: black;
  font-weight: bold;
}

.sidebar a:hover {
  background: #1f1f1f;
}

.sidebar.open {
  left: 0;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 999;
}

.overlay.show {
  display: block;
}

.search {
  padding: 10px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #1f1f1f;
  color: white;
  box-sizing:border-box;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  padding: 10px;
}

.horizontal {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 10px;
}

.horizontal .card {
  min-width: 140px;
}

.card {
  background: #151515;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  height: 235px;
}

.card-img {
  position: relative;
  width: 100%;
  height: 140px;
  background: #222;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.loader {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 26px;
  height: 26px;
  border: 3px solid #333;
  border-top: 3px solid #00c853;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: spin 1s linear infinite;
}

@keyframes spin {
  0% {
    transform: translate(-50%, -50%) rotate(0deg);
  }

  100% {
    transform: translate(-50%, -50%) rotate(360deg);
  }
}

.card-info {
  padding: 8px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-meta {
  font-size: 11px;
  color: #aaa;
  margin-top: 4px;
}

.section-title {
  padding: 10px;
  font-size: 13px;
  color: #aaa;
}

/* BADGE NOVO */
.new-badge {
  position: absolute;
  top: 6px;
  left: 6px;
  background: #00c853;
  color: black;
  font-size: 10px;
  font-weight: bold;
  padding: 4px 8px;
  border-radius: 12px;
  z-index: 5;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar" id="sidebar">

  <a href="index.html" class="active">
    Mods Project Zomboid
  </a>

  <a href="download.html">
    Download Project Zomboid
  </a>

  <a href="MinhasPublicacoes.html"
  id="minhasPubBtn"
  style="display:none;">

    📦 Minha Publicações

  </a>

  <a href="PainelAdm.html"
  id="painelAdmBtn"
  style="display:none;">

    🛠️ Painel ADM

  </a>

  <a href="#">
    Servidores BR
  </a>

  <a href="#">
    Servidores USA
  </a>

  <a href="#">
    Discord
  </a>

</div>

<div class="overlay"
id="overlay"
onclick="toggleMenu()"></div>

<!-- HEADER -->
<div class="header">

  <div class="header-left">

    <div class="menu-btn"
    onclick="toggleMenu()">

      ☰

    </div>

    ModSteam Pro

  </div>

  <div class="header-right">

    <div class="notify-btn">

      🔔

      <div class="notify-dot"></div>

    </div>

    <button class="login-btn"
    id="loginBtn">

      Login

    </button>

  </div>

</div>

<!-- BUSCA -->
<div class="search">

  <input
  type="text"
  id="busca"
  placeholder="Pesquisar mods...">

</div>

<!-- SEÇÕES -->
<div id="sections"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const app = initializeApp({

  databaseURL:
  "https://dayzozmbi-server-default-rtdb.firebaseio.com"

});

const db = getDatabase(app);

let mods = [];

/* LOGIN */
const loginBtn =
document.getElementById("loginBtn");

const usuario =
JSON.parse(
localStorage.getItem("usuarioModSteam")
);

/* BOTÕES */
const minhasPubBtn =
document.getElementById("minhasPubBtn");

const painelAdmBtn =
document.getElementById("painelAdmBtn");

/* LOGIN STATUS */
if(usuario && usuario.nick){

  loginBtn.innerText =
  usuario.nick;

  minhasPubBtn.style.display =
  "block";

  if(usuario.nick === "ADM"){

    painelAdmBtn.style.display =
    "block";

  }else{

    painelAdmBtn.style.display =
    "none";

  }

}else{

  loginBtn.innerText = "Login";

  minhasPubBtn.style.display =
  "none";

  painelAdmBtn.style.display =
  "none";

}

/* LOGIN CLICK */
loginBtn.onclick = ()=>{

  window.location.href =
  "Login.html";

};

/* MENU */
window.toggleMenu = ()=>{

  document
  .getElementById("sidebar")
  .classList.toggle("open");

  document
  .getElementById("overlay")
  .classList.toggle("show");

};

/* RENDER */
function render(){

  const container =
  document.getElementById("sections");

  container.innerHTML = "";

  const search =
  document
  .getElementById("busca")
  .value
  .toLowerCase();

  const filtered = mods.filter(m =>

    (m.nome || "")
    .toLowerCase()
    .includes(search)

  );

  const sorted = [...filtered]

  .sort((a,b)=>

    (b.downloads || 0)
    -
    (a.downloads || 0)

  );

  const top4 =
  sorted.slice(0,4);

  if(top4.length){

    container.appendChild(

      section(
        "🔥 Mais baixados",
        top4,
        true
      )

    );

  }

  const rest =
  sorted.slice(4);

  if(rest.length){

    container.appendChild(

      section(
        "📦 Mods",
        rest,
        false
      )

    );

  }

}

/* SEÇÃO */
function section(title,data,isHorizontal){

  const wrap =
  document.createElement("div");

  const t =
  document.createElement("div");

  t.className =
  "section-title";

  t.innerText = title;

  const grid =
  document.createElement("div");

  grid.className =

    isHorizontal
    ? "horizontal"
    : "grid";

  data.forEach(m=>{

    const div =
    document.createElement("div");

    div.className = "card";

    const agora =
    Date.now();

    const umDia =
    24 * 60 * 60 * 1000;

    const isNovo =

      m.data &&
      (agora - m.data) <= umDia;

    div.innerHTML = `
      <div class="card-img">

        ${
          isNovo
          ? `<div class="new-badge">NOVO</div>`
          : ""
        }

        <div class="loader"></div>

        <img src="${m.iconURL}">

      </div>

      <div class="card-info">

        <div class="card-title">
          ${m.nome}
        </div>

        <div class="card-meta">
          🔧 Build ${m.versao || "N/A"}
        </div>

        <div class="card-meta">
          ⭐ ${m.avaliacao || 0}/5
        </div>

        <div class="card-meta">
          📥 ${m.downloads || 0} Downloads
        </div>

      </div>
    `;

    const img =
    div.querySelector("img");

    const loader =
    div.querySelector(".loader");

    img.onload = ()=>{

      loader.style.display =
      "none";

      img.style.display =
      "block";

    };

    div.onclick = ()=>{

      window.location.href =

      "PaginaVisual.html?id="
      + m.id;

    };

    grid.appendChild(div);

  });

  wrap.appendChild(t);

  wrap.appendChild(grid);

  return wrap;

}

/* PESQUISA */
document
.getElementById("busca")
.addEventListener("input",render);

/* FIREBASE */
onValue(ref(db,"mods"),snap=>{

  mods = [];

  snap.forEach(i=>{

    let data =
    i.val();

    data.id =
    i.key;

    mods.push(data);

  });

  render();

});

</script>

</body>
</html>
