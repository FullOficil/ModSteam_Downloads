<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizar Mod</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
  padding: 15px;
}

.box {
  background: #151515;
  padding: 15px;
  border-radius: 15px;
}

img {
  width: 100%;
  border-radius: 12px;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: #00c853;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="box" id="content">Carregando...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  databaseURL: "https://dayzozmbi-server-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
  document.getElementById("content").innerHTML = "Mod não encontrado.";
}

const snap = await get(ref(db,"mods/"+id));

if(!snap.exists()){
  document.getElementById("content").innerHTML = "Mod não encontrado.";
}

const m = snap.val();

document.getElementById("content").innerHTML = `
  <img src="${m.iconURL}">
  <h2>${m.nome}</h2>
  <p>${m.descricao||""}</p>
  <button onclick="baixar()">⬇ Baixar</button>
`;

window.baixar = ()=>{
  const a = document.createElement("a");
  a.href = m.zipURL;
  a.click();
};
</script>

</body>
</html>
