<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizar Mod</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
  display:flex;
  align-items:center;
  gap:15px;
  font-size:20px;
  font-weight:bold;
}

.back-btn{
  font-size:28px;
  cursor:pointer;
}

/* CARD TOPO */
.top-card{
  padding:20px;
}

.top{
  display:flex;
  gap:15px;
  align-items:flex-start;
}

.icon-box{
  width:95px;
  height:95px;
  border-radius:22px;
  overflow:hidden;
  background:#222;
  flex-shrink:0;
}

.icon-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.top-info{
  flex:1;
}

.top-info h1{
  margin:0;
  font-size:28px;
  font-weight:bold;
}

.autor{
  color:#00c853;
  font-size:15px;
  margin-top:6px;
}

.desc-mini{
  color:#aaa;
  font-size:14px;
  margin-top:4px;
}

/* INFO STYLE PLAYSTORE */
.stats{
  display:flex;
  justify-content:space-between;
  margin-top:25px;
  text-align:center;
}

.stat{
  flex:1;
}

.stat:not(:last-child){
  border-right:1px solid #333;
}

.stat-top{
  font-size:20px;
  font-weight:bold;
}

.stat-bottom{
  font-size:12px;
  color:#aaa;
  margin-top:5px;
}

/* BOTÃO */
.download-btn{
  width:100%;
  border:none;
  padding:18px;
  border-radius:40px;
  background:#00c853;
  color:black;
  font-size:20px;
  font-weight:bold;
  margin-top:25px;
  cursor:pointer;
}

.share-btn{
  width:100%;
  border:none;
  padding:16px;
  border-radius:40px;
  background:#2196f3;
  color:white;
  font-size:18px;
  font-weight:bold;
  margin-top:12px;
  cursor:pointer;
}

/* GALERIA */
.gallery{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:20px;
}

.gallery img{
  width:260px;
  height:150px;
  border-radius:18px;
  object-fit:cover;
  flex-shrink:0;
}

/* DESCRIÇÃO */
.area{
  padding:20px;
}

.area h2{
  margin-top:0;
  font-size:30px;
}

.desc{
  color:#d0d0d0;
  line-height:1.5;
  font-size:16px;
}

/* TAGS */
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:20px;
}

.tag{
  border:1px solid #555;
  padding:10px 15px;
  border-radius:15px;
  font-size:14px;
}

/* AVALIAÇÃO */
.rating-box{
  margin-top:25px;
  background:#151515;
  padding:15px;
  border-radius:16px;
}

.stars{
  display:flex;
  gap:8px;
  font-size:30px;
  margin-top:10px;
}

.star{
  cursor:pointer;
}

textarea{
  width:100%;
  margin-top:15px;
  border:none;
  background:#222;
  color:white;
  border-radius:12px;
  padding:12px;
  box-sizing:border-box;
  resize:none;
  height:90px;
}

.send-btn{
  width:100%;
  margin-top:12px;
  border:none;
  padding:14px;
  border-radius:14px;
  background:#00c853;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

/* COMENTÁRIOS */
.comentarios{
  margin-top:25px;
}

.comentario{
  background:#151515;
  padding:15px;
  border-radius:14px;
  margin-top:12px;
}

.com-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.nick{
  font-weight:bold;
  color:#00c853;
}

.estrelas{
  color:#ffd700;
}

.com-text{
  color:#ccc;
  line-height:1.4;
}

</style>
</head>

<body>

<div class="header">
  <div class="back-btn" onclick="history.back()">←</div>
</div>

<div id="content">
Carregando...
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  get,
  push,
  runTransaction
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  databaseURL:"https://dayzozmbi-server-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);

const usuario =
JSON.parse(localStorage.getItem("usuarioModSteam"));

const params = new URLSearchParams(location.search);

const id = params.get("id");

if(!id){
  document.getElementById("content").innerHTML =
  "Mod não encontrado";
}

/* PEGAR MOD */
const snap = await get(ref(db,"mods/"+id));

if(!snap.exists()){

  document.getElementById("content").innerHTML =
  "Mod não encontrado";

  throw new Error();

}

const m = snap.val();

/* DATA */
const dataFormatada = m.data
? new Date(m.data).toLocaleDateString("pt-BR")
: "N/A";

/* TAMANHO */
let tamanhoMB = m.tamanhoMB || "?";

/* AVALIAÇÕES */
const avaliacoes = m.avaliacoes || {};

let total = 0;
let soma = 0;

Object.values(avaliacoes).forEach(a=>{

  soma += Number(a.estrelas || 0);
  total++;

});

const media = total
? (soma / total).toFixed(1)
: "0.0";

/* RENDER */
document.getElementById("content").innerHTML = `

<div class="top-card">

  <div class="top">

    <div class="icon-box">
      <img src="${m.iconURL}">
    </div>

    <div class="top-info">

      <h1>${m.nome}</h1>

      <div class="autor">
        ${m.autorNick || "Desconhecido"}
      </div>

      <div class="desc-mini">
        ${m.categoria || "Mods"}
      </div>

    </div>

  </div>

  <div class="stats">

    <div class="stat">
      <div class="stat-top">
        ⭐ ${media}
      </div>

      <div class="stat-bottom">
        ${total} avaliações
      </div>
    </div>

    <div class="stat">
      <div class="stat-top">
        📅
      </div>

      <div class="stat-bottom">
        ${dataFormatada}
      </div>
    </div>

    <div class="stat">
      <div class="stat-top">
        📦 ${tamanhoMB}
      </div>

      <div class="stat-bottom">
        MB
      </div>
    </div>

  </div>

  <button class="download-btn" onclick="baixar()">
    Instalar
  </button>

  <button class="share-btn" onclick="compartilhar()">
    Compartilhar
  </button>

</div>

<div class="gallery">

  ${(m.imagens || []).map(i=>`

    <img src="${i}">

  `).join("")}

</div>

<div class="area">

  <h2>Sobre este mod</h2>

  <div class="desc">
    ${m.descricao || ""}
  </div>

  <div class="tags">

    <div class="tag">
      ${m.categoria || "Mods"}
    </div>

    <div class="tag">
      Build ${m.versao || "N/A"}
    </div>

    <div class="tag">
      📥 ${m.downloads || 0} downloads
    </div>

  </div>

  <div class="rating-box">

    <h3>Avaliar Mod</h3>

    <div class="stars">

      <span class="star" data-v="1">⭐</span>
      <span class="star" data-v="2">⭐</span>
      <span class="star" data-v="3">⭐</span>
      <span class="star" data-v="4">⭐</span>
      <span class="star" data-v="5">⭐</span>

    </div>

    <textarea
      id="comentario"
      placeholder="Escreva um comentário..."
    ></textarea>

    <button class="send-btn" onclick="enviarComentario()">
      Enviar Avaliação
    </button>

  </div>

  <div class="comentarios">

    <h3>Comentários</h3>

    ${
      Object.values(avaliacoes)
      .reverse()
      .map(c=>`

      <div class="comentario">

        <div class="com-head">

          <div class="nick">
            ${c.nick}
          </div>

          <div class="estrelas">
            ${"⭐".repeat(c.estrelas)}
          </div>

        </div>

        <div class="com-text">
          ${c.texto}
        </div>

      </div>

    `).join("")
    }

  </div>

</div>

`;

/* ESTRELAS */
let estrelasSelecionadas = 5;

document.querySelectorAll(".star").forEach(s=>{

  s.onclick = ()=>{

    estrelasSelecionadas =
    Number(s.dataset.v);

  };

});

/* COMENTAR */
window.enviarComentario = async ()=>{

  if(!usuario){

    alert("Faça login!");

    return;

  }

  const texto =
  document.getElementById("comentario").value;

  if(!texto){

    alert("Digite algo!");

    return;

  }

  await push(

    ref(db,"mods/"+id+"/avaliacoes"),

    {
      nick: usuario.nick,
      estrelas: estrelasSelecionadas,
      texto,
      data: Date.now()
    }

  );

  alert("Comentário enviado!");

  location.reload();

};

/* DOWNLOAD */
window.baixar = ()=>{

  runTransaction(
    ref(db,"mods/"+id+"/downloads"),
    val=>(val||0)+1
  );

  const a = document.createElement("a");

  a.href = m.zipURL;

  a.click();

};

/* SHARE */
window.compartilhar = ()=>{

  const url = location.href;

  if(navigator.share){

    navigator.share({
      title:m.nome,
      text:"Veja esse mod!",
      url
    });

  }else{

    window.open(
      "https://wa.me/?text="
      +
      encodeURIComponent(
        m.nome + " " + url
      ),
      "_blank"
    );

  }

};

</script>

</body>
</html>
