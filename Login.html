<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login ModSteam</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:90%;
  max-width:350px;
  background:#151515;
  padding:25px;
  border-radius:20px;
}

h2{
  text-align:center;
  margin-top:0;
}

input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:#222;
  color:white;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

.login-btn{
  background:#00c853;
  color:black;
}

.register-btn{
  background:#2196f3;
  color:white;
}

.status{
  margin-top:15px;
  text-align:center;
  color:#aaa;
  font-size:13px;
}
</style>
</head>

<body>

<div class="box">

  <h2>Login ModSteam</h2>

  <input type="text" id="nick" placeholder="Nick">

  <input type="password" id="senha" placeholder="Senha">

  <button class="login-btn" onclick="login()">
    Entrar
  </button>

  <button class="register-btn" onclick="registrar()">
    Registrar
  </button>

  <div class="status" id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  get,
  set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyB5A-ySceXCFRQ7iSCnOA68nRJqYpK6DQc",

  authDomain: "dayzozmbi-server.firebaseapp.com",

  databaseURL: "https://dayzozmbi-server-default-rtdb.firebaseio.com",

  projectId: "dayzozmbi-server",

  storageBucket: "dayzozmbi-server.firebasestorage.app",

  messagingSenderId: "221905253103",

  appId: "1:221905253103:android:fc1bc06782cf5735c4611a"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const statusEl = document.getElementById("status");

function status(msg){
  statusEl.innerText = msg;
}

/* REGISTRAR */
window.registrar = async ()=>{

  const nick = document.getElementById("nick").value.trim();

  const senha = document.getElementById("senha").value.trim();

  if(!nick || !senha){
    return alert("Preencha tudo!");
  }

  status("Criando conta...");

  try{

    const nickSeguro = nick
      .toLowerCase()
      .replace(/[^a-z0-9]/g,"_");

    const usuarioRef = ref(db,"usuarios/"+nickSeguro);

    const snap = await get(usuarioRef);

    if(snap.exists()){
      status("");
      return alert("Esse nick já existe!");
    }

    await set(usuarioRef,{
      nick:nick,
      senha:senha,
      data:Date.now()
    });

    localStorage.setItem(
      "usuarioModSteam",
      JSON.stringify({
        nick:nick
      })
    );

    status("Conta criada!");

    setTimeout(()=>{
      window.location.href = "index.html";
    },1000);

  }catch(e){

    status("");

    alert(e.message);

  }

};

/* LOGIN */
window.login = async ()=>{

  const nick = document.getElementById("nick").value.trim();

  const senha = document.getElementById("senha").value.trim();

  if(!nick || !senha){
    return alert("Preencha tudo!");
  }

  status("Entrando...");

  try{

    const nickSeguro = nick
      .toLowerCase()
      .replace(/[^a-z0-9]/g,"_");

    const usuarioRef = ref(db,"usuarios/"+nickSeguro);

    const snap = await get(usuarioRef);

    if(!snap.exists()){
      status("");
      return alert("Conta não encontrada!");
    }

    const user = snap.val();

    if(user.senha !== senha){
      status("");
      return alert("Senha incorreta!");
    }

    localStorage.setItem(
      "usuarioModSteam",
      JSON.stringify({
        nick:user.nick
      })
    );

    status("Login realizado!");

    setTimeout(()=>{
      window.location.href = "index.html";
    },1000);

  }catch(e){

    status("");

    alert(e.message);

  }

};

</script>

</body>
</html>
